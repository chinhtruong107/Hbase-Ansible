---
- name: Dung 1 jn
  shell: |
    ssh jn1 "sudo /opt/hadoop/bin/hdfs --daemon stop journalnode"
    ssh jn1 "sudo jps"
  register: dung_jn1
  changed_when: false
  failed_when: false
  run_once: true

- name: Hien thi trang thai cac jn sau khi dung 1 jn
  debug:
    var: dung_jn1.stdout_lines
  run_once: true

- name: Kiem tra HDFS van ghi/doc duoc khi mat 1 journalnode
  shell: |
    ssh nn1 "sudo /opt/hadoop/bin/hdfs dfs -rm -r -f /ha_test_jn 2>/dev/null; sudo /opt/hadoop/bin/hdfs dfs -mkdir -p /ha_test_jn"
    ssh nn1 "sudo /opt/hadoop/bin/hdfs dfs -ls /"
    ssh nn1 "sudo /opt/hadoop/bin/hdfs haadmin -getAllServiceState"
  register: kiem_tra_sau_khi_dung_jn
  changed_when: false
  failed_when: false
  retries: 3
  delay: 5
  until: kiem_tra_sau_khi_dung_jn.rc == 0
  run_once: true

- name: Hien thi ket qua kiem tra
  debug:
    var: kiem_tra_sau_khi_dung_jn.stdout_lines
  run_once: true

- name: Xac nhan mkdir thanh cong (quorum con du 2/3 journalnode)
  assert:
    that:
      - "'ha_test_jn' in kiem_tra_sau_khi_dung_jn.stdout"
    fail_msg: "Mat quorum JournalNode! Cluster khong the ghi du lieu khi mat 1/3 JournalNode."
    success_msg: "Quorum JournalNode van hoat dong binh thuong khi mat 1 node."
  run_once: true

- name: Khoi dong lai jn1
  shell: |
    ssh jn1 "sudo /opt/hadoop/bin/hdfs --daemon start journalnode"
    ssh jn1 "sudo jps | grep JournalNode"
  register: khoi_dong_lai_jn1
  changed_when: false
  failed_when: false
  retries: 5
  delay: 3
  until: "'JournalNode' in khoi_dong_lai_jn1.stdout"
  run_once: true

- name: Hien thi ket qua khoi dong lai jn1
  debug:
    var: khoi_dong_lai_jn1.stdout_lines
  run_once: true

- name: Don dep thu muc test
  shell: ssh nn1 "sudo /opt/hadoop/bin/hdfs dfs -rm -r -f /ha_test_jn"
  changed_when: false
  failed_when: false
  run_once: true