---
- name: "[Test1] Xác định NameNode active hiện tại"
  command: /opt/hadoop/bin/hdfs haadmin -getAllServiceState
  delegate_to: nn1
  become: yes
  register: baseline_state

- debug: var=baseline_state.stdout_lines

- name: "[Test1] Dừng NameNode trên nn1 (giả lập active die)"
  command: /opt/hadoop/bin/hdfs --daemon stop namenode
  delegate_to: nn1
  become: yes

- name: "[Test1] Đợi failover"
  pause:
    seconds: 15

- name: "[Test1] Kiểm tra trạng thái sau failover (trên nn2)"
  command: /opt/hadoop/bin/hdfs haadmin -getAllServiceState
  delegate_to: nn2
  become: yes
  register: after_state

- debug: var=after_state.stdout_lines

- name: "[Test1] Kiểm tra HDFS vẫn truy cập được"
  command: /opt/hadoop/bin/hdfs dfs -ls /
  delegate_to: nn2
  become: yes
  register: hdfs_ls

- debug: var=hdfs_ls.stdout_lines

- name: "[Test1] Phục hồi - khởi động lại NameNode nn1"
  command: /opt/hadoop/bin/hdfs --daemon start namenode
  delegate_to: nn1
  become: yes

- name: "[Test1] Đợi nn1 quay lại standby"
  pause:
    seconds: 10

- name: "[Test1] Xác nhận trạng thái cuối cùng"
  command: /opt/hadoop/bin/hdfs haadmin -getAllServiceState
  delegate_to: nn1
  become: yes
  register: final_state

- debug: var=final_state.stdout_lines