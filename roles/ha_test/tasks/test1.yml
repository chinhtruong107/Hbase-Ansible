---
- name: Xac dinh node active hien tai
  command: ssh nn1 "sudo /opt/hadoop/bin/hdfs haadmin -getAllServiceState"
  register: node_active_hien_tai
  changed_when: false
  failed_when: false

- name: Tim dong co chu active
  set_fact:
    active_line: "{{ node_active_hien_tai.stdout_lines | select('search', 'active') | first }}"

- name: Tach ten node tu dong do
  set_fact:
    active_node: "{{ active_line.split(':')[0] }}"

- debug:
    msg: "Node dang active la: {{ active_node }}"

- name: Tim dong co chu standby
  set_fact:
    standby_line: "{{ node_active_hien_tai.stdout_lines | select('search', 'standby') | first }}"

- name: Tach ten node tu dong do
  set_fact:
    standby_node: "{{ standby_line.split(':')[0] }}"

- debug:
    msg: "Node dang standby la: {{ standby_node }}"

- name: Dung NameNode dang active
  command: ssh {{ active_node }} "sudo /opt/hadoop/bin/hdfs --daemon stop namenode"

- name: Kiem tra failover - retry 3 lan, moi lan cach 5 giay
  command: ssh {{ standby_node }} "sudo /opt/hadoop/bin/hdfs haadmin -getAllServiceState"
  register: failover_check
  until: "'active' in failover_check.stdout"
  retries: 3
  delay: 5
  changed_when: false

- debug:
    var: failover_check.stdout_lines

- name: Kiem tra HDFS van truy cap duoc (goi vao node vua len active)
  command: ssh {{ standby_node }} "sudo /opt/hadoop/bin/hdfs dfs -ls /"
  register: hdfs_ls
  changed_when: false

- debug:
    var: hdfs_ls.stdout_lines