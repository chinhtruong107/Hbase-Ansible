---
- name: Precheck - dam bao ca 2 NameNode dang chay truoc khi test
  command: ssh {{ item }} "sudo jps"
  register: nn_precheck
  loop:
    - nn1
    - nn2
  changed_when: false
  failed_when: "'NameNode' not in nn_precheck.stdout"

- name: Xac dinh node active hien tai
  command: ssh nn1 "sudo /opt/hadoop/bin/hdfs haadmin -getAllServiceState"
  register: node_active_hien_tai
  changed_when: false
  failed_when: false

- name: Tim dong co chu active
  set_fact:
    active_line: "{{ node_active_hien_tai.stdout_lines | select('search', 'active') | first }}"

- name: Tach ten node tu dong do
  set_fact:
    active_node: "{{ active_line.split(':')[0] }}"

- debug:
    msg: "Node dang active la: {{ active_node }}"

- name: Tim dong co chu standby
  set_fact:
    standby_line: "{{ node_active_hien_tai.stdout_lines | select('search', 'standby') | first }}"

- name: Tach ten node tu dong do
  set_fact:
    standby_node: "{{ standby_line.split(':')[0] }}"

- debug:
    msg: "Node dang standby la: {{ standby_node }}"

- name: Dung NameNode dang active
  command: ssh {{ active_node }} "sudo /opt/hadoop/bin/hdfs --daemon stop namenode"
  failed_when: false

- name: Kiem tra failover - retry, moi lan cach 10 giay
  command: ssh {{ standby_node }} "sudo /opt/hadoop/bin/hdfs haadmin -getAllServiceState"
  register: failover_check
  until: "'active' in failover_check.stdout"
  retries: 15
  delay: 10
  changed_when: false

- debug:
    var: failover_check.stdout_lines

- name: Kiem tra HDFS van truy cap duoc (goi vao node vua len active)
  command: ssh {{ standby_node }} "sudo /opt/hadoop/bin/hdfs dfs -ls /"
  register: hdfs_ls
  changed_when: false
  retries: 3
  delay: 5
  until: hdfs_ls.rc == 0

- debug:
    var: hdfs_ls.stdout_lines

- name: Phuc hoi - khoi dong lai NameNode vua bi dung
  command: ssh {{ active_node }} "sudo /opt/hadoop/bin/hdfs --daemon start namenode"
  changed_when: false
  failed_when: false

- name: Doi NameNode phuc hoi va quay lai standby
  command: ssh {{ standby_node }} "sudo /opt/hadoop/bin/hdfs haadmin -getAllServiceState"
  register: final_state
  changed_when: false
  retries: 6
  delay: 5
  until: "'standby' in final_state.stdout and 'active' in final_state.stdout"

- debug:
    var: final_state.stdout_lines

- name: Xac nhan HDFS hoat dong sau khi phuc hoi hoan toan
  command: ssh {{ standby_node }} "sudo /opt/hadoop/bin/hdfs dfs -ls /"
  register: final_ls
  changed_when: false
  retries: 3
  delay: 5
  until: final_ls.rc == 0

- debug:
    var: final_ls.stdout_lines