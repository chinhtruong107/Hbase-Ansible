---
- name: Dung 1 ZooKeeper node
  command: ssh zk1 "sudo /opt/zookeeper/bin/zkServer.sh stop"
  register: dung_zk1
  changed_when: false
  failed_when: false
  run_once: true

- name: Hien thi ket qua dung zk1
  debug:
    var: dung_zk1.stdout_lines
  run_once: true

- name: Kiem tra 2 ZooKeeper con lai van song
  shell: |
    ssh hm1 "nc -zv zk2 2181"
    ssh hm1 "nc -zv zk3 2181"
  register: kiem_tra_zk_con_lai
  changed_when: false
  failed_when: false
  run_once: true

- name: Hien thi ket qua kiem tra zk con lai
  debug:
    var: kiem_tra_zk_con_lai.stdout_lines
  run_once: true

- name: Kiem tra HDFS HA van hoat dong
  command: ssh nn1 "sudo /opt/hadoop/bin/hdfs haadmin -getAllServiceState"
  register: hdfs_state_sau_khi_dung_zk1
  changed_when: false
  failed_when: false
  retries: 3
  delay: 5
  until: "'active' in hdfs_state_sau_khi_dung_zk1.stdout"
  run_once: true

- name: Hien thi trang thai HDFS HA
  debug:
    var: hdfs_state_sau_khi_dung_zk1.stdout_lines
  run_once: true

- name: Kiem tra HBase van hoat dong
  command: ssh hm1 "/opt/hbase/bin/hbase shell -n <<< \"status 'simple'\""
  register: hbase_status_sau_khi_dung_zk1
  changed_when: false
  failed_when: false
  retries: 3
  delay: 5
  until: hbase_status_sau_khi_dung_zk1.rc == 0
  run_once: true

- name: Hien thi trang thai HBase
  debug:
    var: hbase_status_sau_khi_dung_zk1.stdout_lines
  run_once: true

- name: Xac nhan cluster van song khi mat 1 ZooKeeper (quorum 2/3 con du)
  assert:
    that:
      - "'active' in hdfs_state_sau_khi_dung_zk1.stdout"
      - hbase_status_sau_khi_dung_zk1.rc == 0
    fail_msg: "Cluster bi anh huong khi mat 1 ZooKeeper! Kiem tra lai quorum ZK."
    success_msg: "Cluster van hoat dong binh thuong khi mat 1/3 ZooKeeper."
  run_once: true

- name: Khoi dong lai zk1
  command: ssh zk1 "sudo /opt/zookeeper/bin/zkServer.sh start"
  register: khoi_dong_lai_zk1
  changed_when: false
  failed_when: false
  run_once: true

- name: Doi zk1 khoi dong lai va tham gia quorum
  command: ssh zk1 "sudo /opt/zookeeper/bin/zkServer.sh status"
  register: zk1_status_sau_phuc_hoi
  changed_when: false
  failed_when: false
  retries: 6
  delay: 5
  until: zk1_status_sau_phuc_hoi.rc == 0
  run_once: true

- name: Hien thi trang thai zk1 sau phuc hoi
  debug:
    var: zk1_status_sau_phuc_hoi.stdout_lines
  run_once: true