---
- name: Lay trang thai HBase Master
  shell: ssh hm1 "/opt/hbase/bin/hbase shell -n <<< \"status 'detailed'\""
  register: hbase_master_status
  changed_when: false
  run_once: true

- name: Xac dinh Active Master
  set_fact:
    active_master: >-
      {{
        'hm1'
        if (
          hbase_master_status.stdout
          | regex_search('(?i)active master[^\\n]*hm1')
        )
        else (
          'hm2'
          if (
            hbase_master_status.stdout
            | regex_search('(?i)active master[^\\n]*hm2')
          )
          else ''
        )
      }}
  run_once: true

- name: Kiem tra co tim thay Active Master
  assert:
    that:
      - active_master | length > 0
    fail_msg: >-
      Khong xac dinh duoc Active HMaster.
      Ket qua: {{ hbase_master_status.stdout }}
    success_msg: "Da xac dinh Active Master: {{ active_master }}"
  run_once: true

- name: Xac dinh Backup Master
  set_fact:
    backup_master: "{{ 'hm2' if active_master == 'hm1' else 'hm1' }}"
  run_once: true

- name: Hien thi Active va Backup Master
  debug:
    msg:
      - "Active Master: {{ active_master }}"
      - "Backup Master: {{ backup_master }}"
  run_once: true

- name: Test failover HMaster
  block:

    - name: Dung Active HMaster
      shell: ssh {{ active_master }} "sudo /opt/hbase/bin/hbase-daemon.sh stop master"
      failed_when: false
      run_once: true

    - name: Kiem tra Active HMaster da dung
      shell: ssh {{ active_master }} "sudo jps | grep -w HMaster"
      register: active_master_sau_stop
      changed_when: false
      failed_when: false
      retries: 5
      delay: 3
      until: active_master_sau_stop.rc != 0
      run_once: true

    - name: Kill HMaster neu chua dung
      shell: ssh {{ active_master }} "sudo pkill -f '[H]Master'"
      when: active_master_sau_stop.rc == 0
      failed_when: false
      run_once: true

    - name: Kiem tra HMaster tren Backup Master
      shell: ssh {{ backup_master }} "sudo jps | grep -w HMaster"
      register: backup_hmaster
      changed_when: false
      retries: 10
      delay: 5
      until: backup_hmaster.rc == 0
      run_once: true

    - name: Cho Backup Master chuyen thanh Active
      shell: ssh {{ backup_master }} "/opt/hbase/bin/hbase shell -n <<< \"status 'detailed'\""
      register: status_sau_failover
      changed_when: false
      retries: 12
      delay: 5
      until: >
        (
          status_sau_failover.stdout
          | regex_search(
              '(?i)active master[^\\n]*' ~ backup_master
            )
        ) is not none
      run_once: true

    - name: Kiem tra danh sach table
      shell: ssh {{ backup_master }} "/opt/hbase/bin/hbase shell -n <<< \"list\""
      register: danh_sach_table
      changed_when: false
      retries: 10
      delay: 5
      until: danh_sach_table.rc == 0
      run_once: true

    - name: Hien thi ket qua test
      debug:
        msg:
          - "Active Master cu: {{ active_master }}"
          - "Active Master moi: {{ backup_master }}"
          - "HMaster: {{ backup_hmaster.stdout }}"
          - "Danh sach table: {{ danh_sach_table.stdout_lines }}"
          - "Failover HBase Master thanh cong"
      run_once: true

  always:

    - name: Khoi dong lai HMaster tren node cu
      shell: ssh {{ active_master }} "sudo /opt/hbase/bin/hbase-daemon.sh start master"
      failed_when: false
      run_once: true

    - name: Kiem tra HMaster sau phuc hoi
      shell: ssh {{ item }} "sudo jps | grep -w HMaster"
      loop:
        - hm1
        - hm2
      register: hmaster_sau_phuc_hoi
      changed_when: false
      failed_when: false
      run_once: true

    - name: Hien thi ket qua phuc hoi
      debug:
        msg: >-
          {{ item.item }}:
          {{
            item.stdout
            if item.stdout | length > 0
            else 'Khong tim thay HMaster'
          }}
      loop: "{{ hmaster_sau_phuc_hoi.results }}"
      loop_control:
        label: "{{ item.item }}"
      run_once: true