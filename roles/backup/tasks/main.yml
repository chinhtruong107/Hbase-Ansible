---
- name: Tao bien ngay gio backup
  set_fact:
    backup_ts: "{{ lookup('pipe', 'date +%Y%m%d_%H%M%S') }}"
  run_once: true

- name: Tao thu muc backup tren HDFS
  command: ssh nn1 "sudo /opt/hadoop/bin/hdfs dfs -mkdir -p /backup/{{ backup_ts }}"
  changed_when: false
  run_once: true

- name: Backup fsimage (metadata cua HDFS) - luu tam tren nn1
  command: ssh nn1 "sudo /opt/hadoop/bin/hdfs dfsadmin -fetchImage /tmp/fsimage_backup_{{ backup_ts }}"
  changed_when: false
  run_once: true

- name: Tai fsimage ve control node (luu an toan, tach khoi cluster)
  shell: |
    scp -r nn1:/tmp/fsimage_backup_{{ backup_ts }} ./backups/hdfs_metadata/
  changed_when: false
  run_once: true
  failed_when: false

- name: Lay danh sach table HBase
  command: ssh hm1 "/opt/hbase/bin/hbase shell -n <<< \"list\""
  register: hbase_table_list
  changed_when: false
  run_once: true

- name: Loc ra ten table that su (bo header, bo dong thua)
  set_fact:
    real_tables: >-
      {{
        hbase_table_list.stdout_lines
        | reject('equalto', 'TABLE')
        | select('match', '^[a-zA-Z0-9_.:-]+$')
        | reject('search', 'Took|hbase:|row')
        | list
      }}
  run_once: true

- name: Hien thi danh sach table that su
  debug:
    var: real_tables
  run_once: true

- name: Doi HMaster san sang truoc khi tao snapshot
  command: ssh hm1 "/opt/hbase/bin/hbase shell -n <<< \"status\""
  register: hbase_ready_check
  changed_when: false
  retries: 5
  delay: 5
  until: hbase_ready_check.rc == 0
  run_once: true

- name: Tao snapshot cho tung table HBase
  shell: |
    ssh hm1 "/opt/hbase/bin/hbase shell -n <<< \"snapshot '{{ item }}', '{{ item }}_snap_{{ backup_ts }}'\""
  loop: "{{ real_tables }}"
  when: real_tables | length > 0
  register: snapshot_result
  changed_when: false
  run_once: true