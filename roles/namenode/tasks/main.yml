---
- name: Download Hadoop
  get_url:
    url: https://downloads.apache.org/hadoop/common/hadoop-3.3.6/hadoop-3.3.6.tar.gz
    dest: /tmp/hadoop.tar.gz

- name: Extract Hadoop
  unarchive:
    src: /tmp/hadoop.tar.gz
    dest: /opt/
    remote_src: yes
  args:
    creates: /opt/hadoop-3.3.6

- name: Rename extracted folder to hadoop
  command: mv /opt/hadoop-3.3.6 /opt/hadoop
  args:
    creates: /opt/hadoop

- name: Copy core-site.xml
  template:
    src: core-site.xml.j2
    dest: /opt/hadoop/etc/hadoop/core-site.xml

- name: Copy hdfs-site.xml
  template:
    src: hdfs-site.xml.j2
    dest: /opt/hadoop/etc/hadoop/hdfs-site.xml

- name: Format NameNode (chỉ chạy 1 lần trên node Active)
  shell: /opt/hadoop/bin/hdfs namenode -format -force
  when: is_first_namenode | bool
  register: format_result
  failed_when: format_result.rc != 0 and "is running" not in format_result.stderr

- name: Start NameNode
  shell: /opt/hadoop/bin/hdfs --daemon start namenode
  register: nn_start
  failed_when: nn_start.rc != 0 and "is running" not in nn_start.stderr

- name: Format ZKFC in ZooKeeper (chỉ chạy 1 lần)
  shell: /opt/hadoop/bin/hdfs zkfc -formatZK -nonInteractive
  when: is_first_namenode | bool
  register: zkfc_format
  failed_when: zkfc_format.rc != 0 and zkfc_format.rc != 2 and "is running" not in zkfc_format.stderr

- name: Start ZKFC
  shell: /opt/hadoop/bin/hdfs --daemon start zkfc
  register: zkfc_start
  failed_when: zkfc_start.rc != 0 and "is running" not in zkfc_start.stderr